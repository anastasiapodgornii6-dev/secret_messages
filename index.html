<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secret Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baskervville:ital,wght@0,400..700;1,400..700&family=Borel&family=Dancing+Script:wght@400..700&family=Fredoka:wght@300..700&family=Oleo+Script:wght@400;700&family=Pacifico&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
   body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0e0e19;
  color: white;
  font-family: 'Space Grotesk', sans-serif;
  padding: 20px;
}

    .box {
  text-align: center;
  width: 90%;
  max-width: 320px;
}

    input {
  padding: 14px;
  width: 100%;
  max-width: 200px;
  text-align: center;
  border-radius: 10px;
  border: none;
  outline: none;
  margin-top: 10px;
  font-size: 16px;
}

    button {
  margin-top: 10px;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #6c5ce7;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

    .result {
      margin-top: 20px;
      font-size: 25px;
    font-family: "Dancing Script", cursive;

      min-height: 40px;
    }

    .hint {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 25px;
  font-family: "Arial", cursive;
  letter-spacing: 1px;
  color: #ffffff;
  text-shadow: 0 0 10px rgba(255,255,255,0.15);
}
  </style>
</head>

<body>

<div class="box">
  <div class="hint">Introdu codul pentru a primi mesajul secret...</div>

  <input id="code" placeholder="••••" maxlength="4">
  <br>
  <button onclick="unlock()">Deblochează</button>

  <div class="result" id="result"></div>
</div>

  function unlock() {
    const code = document.getElementById("code").value;
    const result = document.getElementById("result");

    if (data[code]) {
      result.innerText = data[code];
    } else {
      result.innerText = "";
    }
  }
</script>

</body>
</html>
